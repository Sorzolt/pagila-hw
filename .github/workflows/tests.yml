name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (including submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and start Postgres (Pagila)
        run: docker compose up -d --build

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            docker compose exec -T pg pg_isready -U postgres && exit 0
            sleep 1
          done
          echo "Postgres not ready in time"
          docker compose logs pg
          exit 1

      - name: Run autograder script inside the container
        run: docker compose exec -T pg ./run_tests.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs pg
